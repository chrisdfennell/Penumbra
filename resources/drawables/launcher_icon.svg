<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Penumbra launcher icon: an eclipse split disc (light <-> shadow) meeting at a
       soft penumbra terminator, with an accent rim. Shapes only (no <text>) so it
       rasterises in the headless CI container, where Batik has no font manager. -->
  <defs>
    <linearGradient id="pen" x1="7" y1="0" x2="41" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#ECEDF2"/>
      <stop offset="0.42" stop-color="#E0E1E7"/>
      <stop offset="0.50" stop-color="#787A84"/>
      <stop offset="0.60" stop-color="#22222A"/>
      <stop offset="1"    stop-color="#09090B"/>
    </linearGradient>
    <clipPath id="disc"><circle cx="24" cy="24" r="17"/></clipPath>
  </defs>

  <!-- rounded-square backdrop -->
  <rect width="48" height="48" rx="10" fill="#0E0E12"/>

  <!-- eclipse disc: light -> shadow split -->
  <circle cx="24" cy="24" r="17" fill="url(#pen)"/>

  <!-- faint accent seam on the terminator, clipped to the disc -->
  <rect x="23" y="7" width="2" height="34" fill="#F08A1E" opacity="0.45" clip-path="url(#disc)"/>

  <!-- accent rim -->
  <circle cx="24" cy="24" r="17" fill="none" stroke="#F08A1E" stroke-width="2"/>
</svg>
